services:
  # PostgreSQL — persistent volume for production-style / full-stack deploys.
  # If host port 5432 is already taken, set POSTGRES_PUBLISH_PORT=5433 in .env
  postgres:
    image: postgres:15-alpine
    container_name: rampart-postgres
    environment:
      POSTGRES_USER: rampart
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rampart_dev_password}
      POSTGRES_DB: rampart
    ports:
      - "${POSTGRES_PUBLISH_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rampart"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis — if host 6379 is in use (another Redis container), set REDIS_PUBLISH_PORT=6380 in .env
  redis:
    image: redis:7-alpine
    container_name: rampart-redis
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rampart-backend
    ports:
      - "8000:8000"
    environment:
      # Default: bundled Postgres on the Compose network. Override only if DB is outside Compose:
      # COMPOSE_DATABASE_URL=postgresql://rampart:secret@host.docker.internal:5432/rampart
      - DATABASE_URL=${COMPOSE_DATABASE_URL:-postgresql://rampart:${POSTGRES_PASSWORD:-rampart_dev_password}@postgres:5432/rampart}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars-long}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-key-change-in-production-min-32}
      - KEY_ENCRYPTION_SECRET=${KEY_ENCRYPTION_SECRET:-dev-encryption-key-change-in-production-32-chars}
      
      # OAuth
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      
      # LLM Provider API Keys
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # GLiNER PII Detection Configuration
      - PII_DETECTION_ENGINE=${PII_DETECTION_ENGINE:-hybrid}
      - PII_MODEL_TYPE=${PII_MODEL_TYPE:-balanced}
      - PII_CONFIDENCE_THRESHOLD=${PII_CONFIDENCE_THRESHOLD:-0.7}
      - PII_USE_ONNX=${PII_USE_ONNX:-true}
      
      # Observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      
      # Environment
      - ENVIRONMENT=development
      - DEBUG=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rampart-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NODE_ENV=production
    depends_on:
      - backend
    # Note: Removed volume mounts and dev command for production-optimized build
    # For development, use: docker-compose -f docker-compose.dev.yml up

  # Jaeger all-in-one for tracing (UI at http://localhost:16686)
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: rampart-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true

volumes:
  postgres_data:
  redis_data:
